name: Build The Yard Browser

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install make wget git patch unzip \
            python3 python3-dev python3-pip pigz

      - name: Fetch Firefox source
        run: make fetch

      - name: Prepare source directory
        run: |
          if [ -d l10n ]; then
            echo "l10n directory found; copying to parent"
            cp -a l10n ../l10n
            ls -la ../l10n | head -n 20
          else
            echo "l10n directory not found in repo; proceeding without it"
          fi
          make dir
          cp settings/librewolf.cfg librewolf-152.0.2-1/lw/
          cp settings/distribution/policies.json librewolf-152.0.2-1/lw/
          mkdir -p librewolf-152.0.2-1/lw/defaults/pref
          cp settings/defaults/pref/local-settings.js librewolf-152.0.2-1/lw/defaults/pref/
          cp settings/defaults/pref/local-settings.js librewolf-152.0.2-1/lw/

      - name: Bootstrap
        run: make bootstrap

      - name: Build
        run: |
          cd librewolf-152.0.2-1
          ./mach build -- -j4

      - name: Package
        run: make package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: theyard-browser-linux
          path: "*.tar.xz"
          retention-days: 7
